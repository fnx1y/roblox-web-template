<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Secure Portal</title>

<link rel="icon" href="/CLPD.png?v=8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

/* YOUR GIF BACKGROUND */
background:url("waves.gif") center/cover no-repeat fixed;
}

/* DARK OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,40,0.65);
backdrop-filter:blur(6px);
}

/* LOGIN BOX */
.login-box{
position:relative;
z-index:2;
background:rgba(10,20,60,0.7);
padding:40px;
border-radius:18px;
width:360px;
text-align:center;
box-shadow:0 0 50px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
.title{
font-family:'Orbitron';
font-size:22px;
margin-bottom:10px;
letter-spacing:1px;
}

.subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
transition:.2s;
}

input:focus{
background:rgba(255,255,255,0.15);
}

/* BUTTON */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4d6aff,#6ea8ff);
color:white;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(100,150,255,0.5);
}

/* RESULT TEXT */
.result{
margin-top:15px;
font-size:14px;
opacity:0.85;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
<div class="title">CLPD Secure Access</div>
<div class="subtitle">Authenticate using your Roblox username</div>

<input id="username" placeholder="Roblox Username">

<button onclick="login()">Authenticate</button>

<div class="result" id="result"></div>
</div>

<script>
async function login(){

let username = document.getElementById("username").value;
let result = document.getElementById("result");

if(!username){
result.innerText = "Please enter a username.";
return;
}

result.innerText = "Authenticating...";

/* STEP 1: GET USER ID */
let userRes = await fetch("https://users.roblox.com/v1/usernames/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
"usernames":[username],
"excludeBannedUsers":true
})
});

let userData = await userRes.json();

if(!userData.data.length){
result.innerText = "Invalid username.";
return;
}

let userId = userData.data[0].id;

/* STEP 2: GET GROUP RANK */
let groupId = 342605681;

let rankRes = await fetch(`https://groups.roproxy.com/v2/users/${userId}/groups/roles`);
let rankData = await rankRes.json();

let group = rankData.data.find(g=>g.group.id===groupId);

if(!group){
result.innerText = "User is not in CLPD group.";
return;
}

let rankName = group.role.name;

/* DISPLAY RESULT */
result.innerText = `${username} | Rank: ${rankName}`;

/* SEND TO GOOGLE SHEETS */
fetch("https://script.google.com/macros/s/AKfycbxwb-Zg72kI0WGdRSpohhxYyQ4Hx_fyV9RS4r5phpxsuRdFPWIvYooV792SsE78gxg/exec",{
method:"POST",
body:JSON.stringify({
username:username,
userId:userId,
rank:rankName
})
});

}
</script>

</body>
</html>
