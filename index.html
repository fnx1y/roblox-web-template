<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Authentication Portal</title>

<link rel="icon" href="/CLPD.png?v=10">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:url("waves.gif") center/cover no-repeat fixed;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,40,0.7);
backdrop-filter:blur(8px);
}

/* LOGIN BOX */
.login-box{
position:relative;
z-index:2;
background:rgba(10,20,60,0.75);
padding:45px;
border-radius:18px;
width:380px;
text-align:center;
box-shadow:0 0 60px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.08);
}

/* TITLE */
.title{
font-family:'Orbitron';
font-size:22px;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
margin-top:10px;
outline:none;
}

/* BUTTON */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4d6aff,#6ea8ff);
color:white;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(100,150,255,0.5);
}

/* STATUS */
.result{
margin-top:15px;
font-size:14px;
opacity:0.85;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
<div class="title">CLPD Secure Authentication</div>
<div class="subtitle">Verify your identity using your Roblox account</div>

<input id="username" placeholder="Roblox Username">

<button onclick="login()">Authenticate</button>

<div class="result" id="result"></div>
</div>

<script>
async function fetchWithTimeout(url, options={}, timeout=8000){
return Promise.race([
fetch(url, options),
new Promise((_, reject)=>
setTimeout(()=>reject(new Error("Timeout")), timeout)
)
]);
}

async function login(){

const username = document.getElementById("username").value.trim();
const result = document.getElementById("result");

if(!username){
result.innerText = "Please enter a valid username.";
return;
}

result.innerText = "Verifying account...";

try {

/* STEP 1: USER ID */
const userRes = await fetchWithTimeout(
"https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
}
);

const userData = await userRes.json();

if(!userData.data || !userData.data.length){
result.innerText = "Account not found.";
return;
}

const userId = userData.data[0].id;

/* STEP 2: GROUP RANK */
result.innerText = "Fetching rank...";

const rankRes = await fetchWithTimeout(
`https://groups.roproxy.com/v2/users/${userId}/groups/roles`
);

const rankData = await rankRes.json();

const group = rankData.data.find(g=>g.group.id===342605681);

if(!group){
result.innerText = "User is not a member of CLPD.";
return;
}

const rank = group.role.name;

/* SUCCESS */
result.innerText = `${username} | Rank: ${rank}`;

/* DISCORD WEBHOOK */
await fetch("https://discord.com/api/webhooks/1493055782500171856/CalFGzy3AwXi50_ByS3kFraKD_y2yK5uTRNmA7POsRHPQ2_XKy270GsswlM0Iw-oDh-C",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`🔐 CLPD Authentication\nUser: ${username}\nRank: ${rank}`
})
});

} catch(err){
console.error(err);
result.innerText = "Authentication failed. Please try again.";
}

}
</script>

</body>
</html>
