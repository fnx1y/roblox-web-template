<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Secure Terminal</title>

<link rel="icon" href="/CLPD.png?v=15">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Rajdhani',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#cbd3ff;
background:url("waves.gif") center/cover no-repeat fixed;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(5,10,25,0.9);
}

.terminal{
position:relative;
z-index:2;
width:420px;
padding:30px;
background:rgba(10,15,35,0.95);
border:1px solid rgba(100,140,255,0.3);
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.title{color:#8fa7ff;}

input{
width:100%;
padding:12px;
background:transparent;
border:1px solid rgba(100,140,255,0.4);
color:#cbd3ff;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:transparent;
border:1px solid #6ea8ff;
color:#6ea8ff;
cursor:pointer;
}

.output{
margin-top:15px;
font-size:13px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="terminal">

<div class="header">
<div class="title">CLPD AUTH TERMINAL</div>
<div>SECURE</div>
</div>

<input id="username" placeholder="ENTER USERNAME">

<button onclick="login()">AUTHENTICATE</button>

<div class="output" id="output"></div>

</div>

<script>

async function login(){

const username = document.getElementById("username").value.trim();
const output = document.getElementById("output");

if(!username){
output.innerText="ERROR: ENTER USERNAME";
return;
}

output.innerText="RESOLVING USER...";

try{

/* 🔥 FIXED USER ID FETCH (ROPROXY) */
let userRes = await fetch("https://users.roproxy.com/v1/usernames/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

let userData = await userRes.json();

if(!userData.data || !userData.data.length){
output.innerText="ERROR: USER NOT FOUND";
return;
}

let userId = userData.data[0].id;

output.innerText="CHECKING GROUP MEMBERSHIP...";

/* 🔥 GROUP FETCH */
let groupRes = await fetch(`https://groups.roproxy.com/v2/users/${userId}/groups/roles`);
let groupData = await groupRes.json();

let group = groupData.data.find(g=>g.group.id===342605681);

if(!group){
output.innerText="ACCESS DENIED: NOT IN CLPD";
return;
}

let rank = group.role.name;

/* ✅ SUCCESS */
output.innerText =
`ACCESS GRANTED
USER: ${username}
ID: ${userId}
RANK: ${rank}`;

/* 🔔 WEBHOOK */
fetch("https://discord.com/api/webhooks/1493055782500171856/CalFGzy3AwXi50_ByS3kFraKD_y2yK5uTRNmA7POsRHPQ2_XKy270GsswlM0Iw-oDh-C",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`CLPD LOGIN\nUSER: ${username}\nRANK: ${rank}`
})
});

}catch(err){
console.error(err);
output.innerText="ERROR: NETWORK FAILURE";
}

}
</script>

</body>
</html>
