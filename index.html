<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Secure Portal</title>

<link rel="icon" href="/CLPD.png?v=7">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

/* YOUR GIF BACKGROUND */
background:url("waves.gif") center/cover no-repeat fixed;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,40,0.6);
backdrop-filter:blur(6px);
}

/* LOGIN BOX */
.login-box{
position:relative;
z-index:2;
background:rgba(10,20,60,0.6);
padding:40px;
border-radius:16px;
width:350px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* TITLE */
.title{
font-family:'Orbitron';
font-size:20px;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

/* BUTTON */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4d6aff;
color:white;
cursor:pointer;
}

/* RESULT */
.result{
margin-top:15px;
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
<div class="title">CLPD Secure Access</div>

<input id="username" placeholder="Roblox Username">

<button onclick="login()">Authenticate</button>

<div class="result" id="result"></div>
</div>

<script>
async function login(){

let username = document.getElementById("username").value;
let result = document.getElementById("result");

result.innerText = "Authenticating...";

/* STEP 1: GET USER ID */
let userRes = await fetch("https://users.roblox.com/v1/usernames/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
"usernames":[username],
"excludeBannedUsers":true
})
});

let userData = await userRes.json();

if(!userData.data.length){
result.innerText = "Invalid username.";
return;
}

let userId = userData.data[0].id;

/* STEP 2: GET GROUP RANK */
let groupId = 342605681;

let rankRes = await fetch(`https://groups.roproxy.com/v2/users/${userId}/groups/roles`);
let rankData = await rankRes.json();

let group = rankData.data.find(g=>g.group.id===groupId);

if(!group){
result.innerText = "User not in CLPD group.";
return;
}

let rankName = group.role.name;

/* DISPLAY */
result.innerText = `${username} | Rank: ${rankName}`;

/* SEND TO GOOGLE SCRIPT */
fetch("YOUR_SCRIPT_URL",{
method:"POST",
body:JSON.stringify({
username:username,
userId:userId,
rank:rankName
})
});

}
</script>

</body>
</html>
