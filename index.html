<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Secure Terminal</title>

<link rel="icon" href="/CLPD.png?v=14">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Rajdhani',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#cbd3ff;
background:url("waves.gif") center/cover no-repeat fixed;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(5,10,25,0.85);
backdrop-filter:blur(6px);
}

.terminal{
position:relative;
z-index:2;
width:420px;
padding:30px;
background:rgba(10,15,35,0.9);
border:1px solid rgba(100,140,255,0.3);
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.title{color:#8fa7ff;}

input{
width:100%;
padding:12px;
background:transparent;
border:1px solid rgba(100,140,255,0.3);
color:#cbd3ff;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:transparent;
border:1px solid #6ea8ff;
color:#6ea8ff;
cursor:pointer;
}

.output{
margin-top:15px;
font-size:13px;
min-height:40px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="terminal">

<div class="header">
<div class="title">CLPD AUTH TERMINAL</div>
<div>SECURE</div>
</div>

<input id="username" placeholder="ENTER USERNAME">

<button onclick="login()">AUTHENTICATE</button>

<div class="output" id="output"></div>

</div>

<script>

/* SAFE FETCH WITH TIMEOUT */
function safeFetch(url, options={}, timeout=6000){
return Promise.race([
fetch(url, options),
new Promise((_,reject)=>setTimeout(()=>reject("timeout"), timeout))
]);
}

async function getUserId(username){

/* TRY MAIN API */
try{
let res = await safeFetch("https://users.roblox.com/v1/usernames/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

let data = await res.json();
if(data.data && data.data.length){
return data.data[0].id;
}
}catch{}

/* FALLBACK METHOD */
try{
let res = await safeFetch(`https://api.allorigins.win/raw?url=https://users.roblox.com/v1/usernames/users`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

let data = await res.json();
if(data.data && data.data.length){
return data.data[0].id;
}
}catch{}

return null;
}

async function login(){

const username = document.getElementById("username").value.trim();
const output = document.getElementById("output");

if(!username){
output.innerText="ERROR: ENTER USERNAME";
return;
}

output.innerText="RESOLVING USER...";

const userId = await getUserId(username);

if(!userId){
output.innerText="ERROR: USER NOT FOUND / API FAIL";
return;
}

output.innerText="CHECKING GROUP...";

try{

let res = await safeFetch(`https://groups.roproxy.com/v2/users/${userId}/groups/roles`);
let data = await res.json();

let group = data.data.find(g=>g.group.id===342605681);

if(!group){
output.innerText="ACCESS DENIED: NOT CLPD";
return;
}

let rank = group.role.name;

output.innerText = `ACCESS GRANTED\nID: ${userId}\nRANK: ${rank}`;

/* WEBHOOK */
fetch("https://discord.com/api/webhooks/1493055782500171856/CalFGzy3AwXi50_ByS3kFraKD_y2yK5uTRNmA7POsRHPQ2_XKy270GsswlM0Iw-oDh-C",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`CLPD LOGIN\nUSER: ${username}\nRANK: ${rank}`
})
});

}catch{
output.innerText="ERROR: GROUP FETCH FAILED";
}

}
</script>

</body>
</html>
