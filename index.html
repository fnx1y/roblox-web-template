<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLPD Secure Portal</title>

<link rel="icon" href="/CLPD.png?v=9">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:url("waves.gif") center/cover no-repeat fixed;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,40,0.65);
backdrop-filter:blur(6px);
}

.login-box{
position:relative;
z-index:2;
background:rgba(10,20,60,0.7);
padding:40px;
border-radius:18px;
width:360px;
text-align:center;
box-shadow:0 0 50px rgba(0,0,0,0.8);
}

.title{
font-family:'Orbitron';
font-size:22px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4d6aff,#6ea8ff);
color:white;
cursor:pointer;
}

.result{
margin-top:15px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
<div class="title">CLPD Access</div>

<input id="username" placeholder="Roblox Username">

<button onclick="login()">Enter</button>

<div class="result" id="result"></div>
</div>

<script>
async function login(){

let username = document.getElementById("username").value;
let result = document.getElementById("result");

if(!username){
result.innerText = "Enter username.";
return;
}

result.innerText = "Checking...";

/* FAST USER FETCH */
let userRes = await fetch("https://users.roblox.com/v1/usernames/users",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usernames:[username]})
});

let userData = await userRes.json();
if(!userData.data.length){
result.innerText = "Invalid username.";
return;
}

let userId = userData.data[0].id;

/* FAST RANK FETCH */
let rankRes = await fetch(`https://groups.roproxy.com/v2/users/${userId}/groups/roles`);
let rankData = await rankRes.json();

let group = rankData.data.find(g=>g.group.id===342605681);

if(!group){
result.innerText = "Not in CLPD.";
return;
}

let rank = group.role.name;

/* DISPLAY */
result.innerText = `${username} | ${rank}`;

/* SAFE WEBHOOK (NO PASSWORDS) */
fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`CLPD Login:\nUser: ${username}\nRank: ${rank}`
})
});

}
</script>

</body>
</html>
